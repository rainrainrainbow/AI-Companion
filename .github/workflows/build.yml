name: Build AI Companion APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

env:
  BUILD_TYPE: ${{ inputs.build_type || 'debug' }}

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10'
          validate-wrappers: false

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.10
          chmod +x gradlew

      - name: Prepare native lib dirs
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          mkdir -p app/src/main/jniLibs/armeabi-v7a

      - name: Build native libraries
        run: |
          chmod +x scripts/build_native.sh
          bash scripts/build_native.sh

      - name: Build APK
        run: |
          if [ "$BUILD_TYPE" = "release" ]; then
            ./gradlew assembleRelease -x lint -x test --no-daemon
          else
            ./gradlew assembleDebug -x lint -x test --no-daemon
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ai-companion-${{ env.BUILD_TYPE }}.apk
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: warn

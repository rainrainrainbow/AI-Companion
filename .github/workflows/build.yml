name: Build AI Companion APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (debug/release)'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

env:
  BUILD_TYPE: ${{ inputs.build_type || 'debug' }}

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Prepare native libs (placeholder)
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          mkdir -p app/src/main/jniLibs/armeabi-v7a
          echo "Native libs will be downloaded on first app launch"

      - name: Build APK
        run: |
          if [ "$BUILD_TYPE" = "release" ]; then
            ./gradlew assembleRelease -x lint -x test
          else
            ./gradlew assembleDebug -x lint -x test
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-companion-${{ env.BUILD_TYPE }}.apk
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: warn

      - name: Create Release
        if: env.BUILD_TYPE == 'release' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "星璃 AI伴侣 v${{ github.run_number }}"
          body: |
            ## ✨ 星璃 AI伴侣 v${{ github.run_number }}
            
            **全本地AI伴侣 | 3D虚拟形象 | 语音交互 | 手机微调**
            
            ### 📦 安装说明
            1. 下载APK后安装
            2. 首次启动会自动下载模型文件 (~300MB，建议WiFi)
            3. 授予麦克风权限以使用语音输入
            
            ### 🔧 技术栈
            - LLM: Qwen2.5-0.5B via llama.cpp
            - 3D渲染: Google Filament
            - STT: whisper.cpp
            - TTS: Android TTS + VITS
            - UI: Jetpack Compose + Material3
          files: |
            app/build/outputs/apk/**/*.apk
          draft: false
          prerelease: false